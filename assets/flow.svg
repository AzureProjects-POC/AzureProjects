<line class="a" x1="605" y1="75" x2="650" y2="75"/>
<rect class="box" x="655" y="38" width="150" height="74" rx="10"/><text class="t" x="675" y="68">Activity Logs</text><text class="s" x="675" y="91">Fetch changes</text>
