<svg xmlns="http://www.w3.org/2000/svg" width="980" height="150" viewBox="0 0 980 150">
<defs><style>.box{fill:#fff;stroke:#b9c7d8;stroke-width:2;rx:10}.t{font-family:Segoe UI,Arial;font-size:16px;font-weight:600;fill:#0b2f5b}.s{font-family:Segoe UI,Arial;font-size:12px;fill:#486581}.a{stroke:#2563eb;stroke-width:2;marker-end:url(#arrow)} marker{overflow:visible}</style>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/></marker></defs>
<rect class="box" x="10" y="38" width="140" height="74" rx="10"/><text class="t" x="30" y="68">Input</text><text class="s" x="30" y="91">Resource + time</text>
<line class="a" x1="155" y1="75" x2="200" y2="75"/>
